# Maintained items list for the SEC Financials Extractor.
#
# Each item below produces ONE column in the output CSV, in the order listed.
#
# Two ways to define how a value is computed:
#
#   A) Direct tag lookup — provide `xbrl_tags` (ordered fallback list).
#      First tag with a reported value wins. Handles taxonomy variation
#      across filers (e.g. ASC 606 vs older revenue tags).
#
#   B) Derivation — provide `derivation` with `add` and (optionally)
#      `subtract` lists of tags. The item's value is sum(add) − sum(subtract).
#      Used when no single XBRL tag matches the desired concept (e.g.
#      total debt = non-current LT debt + current portion of LT debt).
#
# Items flagged with "# QUESTION:" comments still need owner confirmation
# before the list is considered locked. See REQUIREMENTS.md §5.2.

items:

  # ──────────────────────────────────────────────────────────────────────
  # Income Statement
  # ──────────────────────────────────────────────────────────────────────

  - key: revenue
    display_name: Revenue
    statement: income
    flow_or_stock: flow
    unit: USD
    xbrl_tags:
      - Revenues
      - RevenueFromContractWithCustomerExcludingAssessedTax
      - RevenueFromContractWithCustomerIncludingAssessedTax
      - SalesRevenueNet
      - SalesRevenueGoodsNet

  - key: other_revenue
    display_name: Other Revenue
    statement: income
    flow_or_stock: flow
    unit: USD
    # Non-operating other income. Includes interest income, investment
    # gains, and miscellaneous non-operating income items. Confirmed by
    # owner: interest income belongs here, not in interest_expense.
    xbrl_tags:
      - OtherNonoperatingIncomeExpense
      - NonoperatingIncomeExpense
      - OtherIncome

  - key: cost_of_sales
    display_name: COS
    statement: income
    flow_or_stock: flow
    unit: USD
    xbrl_tags:
      - CostOfGoodsAndServicesSold
      - CostOfRevenue
      - CostOfGoodsSold

  - key: other_cost_of_sales
    display_name: Other COS
    statement: income
    flow_or_stock: flow
    unit: USD
    # Expected to be blank for most filers. Captures unusual cost-of-sales
    # line items when present.
    xbrl_tags:
      - OtherCostOfOperatingRevenue
      - OtherCostAndExpenseOperating

  - key: operating_expenses
    display_name: Op. Cost
    statement: income
    flow_or_stock: flow
    unit: USD
    # Interpreted as total OpEx (SG&A + R&D + other operating expenses,
    # i.e. everything between Gross Profit and Operating Income).
    xbrl_tags:
      - OperatingExpenses
      - OperatingCostsAndExpenses

  - key: other_costs
    display_name: OtherCost
    statement: income
    flow_or_stock: flow
    unit: USD
    # Non-operating other expense, symmetric to `other_revenue`.
    xbrl_tags:
      - OtherNonoperatingExpense
      - OtherExpenses

  - key: interest_expense
    display_name: Interest
    statement: income
    flow_or_stock: flow
    unit: USD
    # Gross interest cost only. Interest income is captured in
    # `other_revenue`, not netted here.
    xbrl_tags:
      - InterestExpense
      - InterestExpenseDebt
      - InterestExpenseOperating
      - InterestExpenseNonoperating         # used by NVIDIA FY2025+ onwards

  - key: income_tax_expense
    display_name: Tax
    statement: income
    flow_or_stock: flow
    unit: USD
    xbrl_tags:
      - IncomeTaxExpenseBenefit

  - key: minority_interest
    display_name: Minority Interest
    statement: income
    flow_or_stock: flow
    unit: USD
    xbrl_tags:
      - NetIncomeLossAttributableToNoncontrollingInterest

  - key: net_income
    display_name: Net Income
    statement: income
    flow_or_stock: flow
    unit: USD
    # Net income attributable to the parent's common shareholders, after
    # minority interest.
    xbrl_tags:
      - NetIncomeLoss
      - ProfitLoss
      - NetIncomeLossAvailableToCommonStockholdersBasic

  - key: shares_diluted
    display_name: Shares
    statement: income
    flow_or_stock: period_avg
    unit: shares
    # Weighted-average diluted shares — the denominator for diluted EPS.
    # `period_avg`: NOT additive across quarters. The annual 10-K reports a
    # full-year weighted average, which does NOT equal Q1+Q2+Q3+Q4. M1
    # leaves Q4 blank with a note; a future milestone (8-K parsing) can
    # source Q4 directly from the earnings release.
    xbrl_tags:
      - WeightedAverageNumberOfDilutedSharesOutstanding
      - WeightedAverageNumberOfSharesOutstandingDiluted

  # ──────────────────────────────────────────────────────────────────────
  # Balance Sheet
  # ──────────────────────────────────────────────────────────────────────

  - key: cash
    display_name: Cash
    statement: balance_sheet
    flow_or_stock: stock
    unit: USD
    xbrl_tags:
      - CashAndCashEquivalentsAtCarryingValue
      - CashCashEquivalentsRestrictedCashAndRestrictedCashEquivalents
      - Cash

  - key: investments
    display_name: Investments
    statement: balance_sheet
    flow_or_stock: stock
    unit: USD
    # Current (short-term) marketable securities. The fallback list is
    # tried in order — first tag with a balance fact wins per quarter.
    # Different filers and even different filings from the same filer
    # use different tags:
    #   - MarketableSecuritiesCurrent: combined (debt+equity) — older
    #     convention, widely used in 10-Qs.
    #   - DebtSecuritiesCurrent / EquitySecuritiesFvNiCurrent: ASC 320 /
    #     ASC 321 split — newer 10-Q convention (e.g. NVDA FY2027+).
    #   - AvailableForSaleSecuritiesDebtMaturitiesWithinOneYearFairValue:
    #     used by some 10-Ks that classify debt by maturity bucket
    #     instead of current/noncurrent (e.g. NVDA's 10-K).
    #
    # When a filer reports both equity and debt as SEPARATE current tags
    # (rather than one combined `MarketableSecuritiesCurrent`), this
    # fallback picks only ONE — the equity portion can be missed. That's
    # the trade-off for avoiding double-counting against filers that
    # report both a combined tag and a split tag in the same period
    # (which would happen if we summed via derivation).
    #
    # For total marketable holdings including noncurrent equity, add a
    # separate `long_term_investments` item using
    # EquitySecuritiesFVNINoncurrent / MarketableSecuritiesNoncurrent.
    xbrl_tags:
      - MarketableSecuritiesCurrent
      - ShortTermInvestments
      - AvailableForSaleSecuritiesCurrent
      - DebtSecuritiesCurrent
      - EquitySecuritiesFvNiCurrent
      - AvailableForSaleSecuritiesDebtMaturitiesWithinOneYearFairValue

  - key: current_assets
    display_name: Current Assets
    statement: balance_sheet
    flow_or_stock: stock
    unit: USD
    xbrl_tags:
      - AssetsCurrent

  - key: fixed_assets
    display_name: Fixed Assets
    statement: balance_sheet
    flow_or_stock: stock
    unit: USD
    # Net of accumulated depreciation. If you want gross PP&E, swap to
    # PropertyPlantAndEquipmentGross.
    xbrl_tags:
      - PropertyPlantAndEquipmentNet

  - key: total_assets
    display_name: Assets
    statement: balance_sheet
    flow_or_stock: stock
    unit: USD
    xbrl_tags:
      - Assets

  - key: debt
    display_name: Debt
    statement: balance_sheet
    flow_or_stock: stock
    unit: USD
    # Long-term debt including the current portion (i.e. the part of LT
    # debt due within 12 months and classified as a current liability).
    # Excludes pure short-term borrowings (e.g. revolving credit / CP).
    derivation:
      add:
        - LongTermDebtNoncurrent
        - LongTermDebtCurrent
      subtract: []

  - key: total_liabilities
    display_name: Liabilities
    statement: balance_sheet
    flow_or_stock: stock
    unit: USD
    xbrl_tags:
      - Liabilities

  - key: retained_earnings
    display_name: Retained
    statement: balance_sheet
    flow_or_stock: stock
    unit: USD
    xbrl_tags:
      - RetainedEarningsAccumulatedDeficit

  # ──────────────────────────────────────────────────────────────────────
  # Cash Flow Statement
  # ──────────────────────────────────────────────────────────────────────

  - key: depreciation
    display_name: Depreciation
    statement: cash_flow
    flow_or_stock: flow
    unit: USD
    # Split from amortization where possible. Pure-D tags are tried first;
    # the combined-D&A fallback (DepreciationDepletionAndAmortization, used
    # by Apple, NVIDIA, many others) kicks in only when no pure quarterly
    # depreciation is reported. For those filers this column will contain
    # combined D+A — the sources sidecar records which tag was used so
    # readers can distinguish.
    xbrl_tags:
      - Depreciation
      - DepreciationNonproduction
      - DepreciationDepletionAndAmortization
      - DepreciationAndAmortization

  - key: amortization
    display_name: Amort
    statement: cash_flow
    flow_or_stock: flow
    unit: USD
    xbrl_tags:
      - AmortizationOfIntangibleAssets
      - Amortization
      - AdjustmentForAmortization

  - key: stock_compensation
    display_name: StockComp
    statement: cash_flow
    flow_or_stock: flow
    unit: USD
    xbrl_tags:
      - ShareBasedCompensation

  - key: capex
    display_name: Capital Spending
    statement: cash_flow
    flow_or_stock: flow
    unit: USD
    # Reported as a cash outflow (positive value in the source; the SEC
    # convention is "payments" tags carry the absolute cash outflow).
    xbrl_tags:
      - PaymentsToAcquirePropertyPlantAndEquipment
      - PaymentsToAcquireProductiveAssets        # used by NVIDIA, some others
      - PaymentsForCapitalImprovements

  - key: cash_from_operations
    display_name: Op. Cash Change
    statement: cash_flow
    flow_or_stock: flow
    unit: USD
    # Bottom-line total of the operating section of the cash flow statement.
    xbrl_tags:
      - NetCashProvidedByUsedInOperatingActivities

  - key: dividends_paid
    display_name: DivPaid
    statement: cash_flow
    flow_or_stock: flow
    unit: USD
    xbrl_tags:
      - PaymentsOfDividends
      - PaymentsOfDividendsCommonStock

  - key: debt_change
    display_name: Debt Change
    statement: cash_flow
    flow_or_stock: flow
    unit: USD
    # Net cash from debt financing: issuances minus repayments. Includes
    # long-term, short-term, and a generic `RepaymentsOfDebt` tag used by
    # filers that don't split repayments by maturity (e.g. NVIDIA).
    # Missing components contribute zero, so filers using only one
    # convention are handled cleanly. Double-counting would only occur
    # if a filer reported BOTH the generic and the LT/ST-specific
    # repayment tags in the same period — rare in practice (filers
    # typically use one convention).
    derivation:
      add:
        - ProceedsFromIssuanceOfLongTermDebt
        - ProceedsFromShortTermDebt
      subtract:
        - RepaymentsOfLongTermDebt
        - RepaymentsOfShortTermDebt
        - RepaymentsOfDebt                 # generic — used by NVIDIA

  - key: equity_change
    display_name: Equity Change
    statement: cash_flow
    flow_or_stock: flow
    unit: USD
    # Net cash from equity financing: stock issuance minus repurchases.
    # Dividends paid are NOT netted here — tracked separately as
    # `dividends_paid`.
    derivation:
      add:
        - ProceedsFromIssuanceOfCommonStock
      subtract:
        - PaymentsForRepurchaseOfCommonStock
